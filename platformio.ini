; PlatformIO project configuration
; -----------------------------------------------------------------------------
;   Build + flash the board:   pio run -e nano_33_iot -t upload
;   Serial monitor:            pio device monitor
;   Run host unit tests:       pio test -e native
; -----------------------------------------------------------------------------

[platformio]
default_envs = nano_33_iot

; ─── Target board: Arduino Nano 33 IoT (SAMD21 + NINA-W102) ──────────────────
[env:nano_33_iot]
platform = atmelsam
board = nano_33_iot
framework = arduino
monitor_speed = 115200
lib_deps =
    fastled/FastLED@^3.7.0
    arduino-libraries/ArduinoBLE@^1.3.0
    arduino-libraries/WiFiNINA@^1.8.0

; ─── Host unit tests (no board required) ─────────────────────────────────────
; Runs the Unity tests in test/ against the pure logic in lib/ParamParser.
; test_build_src = no keeps the Arduino-dependent src/ out of the native build.
[env:native]
platform = native
test_framework = unity
test_build_src = no
build_flags = -std=c++11 -Wall -Wextra
